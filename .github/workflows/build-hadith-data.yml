name: Build Hadith Data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/build-hadiths.js
      - package.json

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build daily + full library databases
        run: npm run build:all

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hadiths.json data/build-info.json data/build-info-library.json data/library/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Rebuild hadith data [automated]"
            git push
          fi
